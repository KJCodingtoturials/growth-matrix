ience Targeting.`,`Module 4 - Meta Ads (Advanced Strategies): Detailed Targeting (Demographics, Interests). Meta Pixel aur Conversions API (Events Tracking). Custom aur Lookalike Audiences (LAL). Retargeting Campaigns, A/B Testing, aur Ads Metrics (CTR, CPC, ROAS) analytics.`,`Module 5 - Ad Creatives & Copywriting: Aisi Ad Copy likhna jo click par majboor kare (Headlines, Primary text). Canva ya basic tools ke zariye attention-grabbing images aur video ads banana. Facebook Ad Policies aur account bans se bachne ke tareeqay.`,`Module 6 - Client Hunting & Freelancing: Dummy projects se portfolio banana. Local (Restaurants, Real Estate) aur International (LinkedIn, Cold Email) clients hunt karna. Fiverr/Upwork profile setup, Client meeting/closing, aur Pricing Strategy (Retainer, Fixed).`],features:[`Alternate Day Live Classes`,`LMS recordings repository access`,`Active marketing campaigns live evaluation`,`Freelancing tips for digital marketers`]},"ai-web-dev":{title:`AI Advance-Webdevelopment Course`,tagline:`Batch 2 flagship program. Learn Vibe Coding, WordPress, AI tools, GitHub & Earning.`,fee:`Rs. 1000`,timing:`6 Days a week class, 40 to 50 minutes duration`,starts:`Batch 2`,badgeColor:`badge-gold`,description:`Seekhein modern Vibe Coding workflows, LLM prompting (Google AI Studio, Antigravity, Lovable, Codex), localhost WordPress installation, backend integration aur freelancing/earning opportunities.`,syllabi:[`Module 1 - Vibe Coding & Web Fundamentals: Vibe coding kya hai aur iska mindset. Static, Dynamic, Web Apps mein farq. Prompt Engineering for Developers (Good vs Bad Prompts). Code likhne se pehle Sitemap aur Wireframing.`,`Module 2 - Local Environment & CMS Basics: Localhost Setup (XAMPP/Node.js environment). WordPress ko install karna, aur Vibe Coding ke zariye custom themes ya plugins mein AI ki madad se changes karna.`,`Module 3 - Advanced AI Tools & Ecosystem: LLM IDEs Masterclass (Cursor, GitHub Copilot). AI-powered web builders se tezi se UI/UX des
